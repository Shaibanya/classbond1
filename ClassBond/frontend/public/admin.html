<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inquiries — TutorConnect Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #f8fafc; color: #1e293b; padding: 1.25rem; }
    h1 { margin-bottom: 0.5rem; font-size: clamp(1.4rem, 4vw, 1.75rem); }
    p.sub { color: #64748b; margin-bottom: 1.5rem; font-size: 0.95rem; }
    a { color: #4f46e5; }
    .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.78rem; font-weight: 600; background: #dbeafe; color: #1d4ed8; }
    .badge-class { background: #fef3c7; color: #92400e; }
    .empty { text-align: center; padding: 3rem 1rem; color: #64748b; }

    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { width: 100%; min-width: 560px; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 24px rgba(15,23,42,0.08); }
    th, td { padding: 0.875rem 1rem; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 0.9rem; }
    th { background: #f1f5f9; font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.04em; color: #64748b; }
    tr:last-child td { border-bottom: none; }

    .cards { display: none; gap: 1rem; }
    .card { background: #fff; border-radius: 12px; padding: 1.25rem; box-shadow: 0 4px 24px rgba(15,23,42,0.08); }
    .card-row { display: flex; justify-content: space-between; align-items: center; padding: 0.4rem 0; font-size: 0.9rem; }
    .card-row span:first-child { color: #64748b; }
    .card-badges { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }

    @media (max-width: 640px) {
      body { padding: 1rem; }
      .table-wrap { display: none; }
      .cards { display: flex; flex-direction: column; }
    }
  </style>
</head>
<body>
  <h1>Student Inquiries</h1>
  <p class="sub">All form submissions saved to the database. <a href="/">← Back to website</a></p>
  <div id="table-wrap" class="table-wrap"></div>
  <div id="cards-wrap" class="cards"></div>
  <script>
    function formatDate(iso) {
      return new Date(iso + 'Z').toLocaleString();
    }

    async function loadInquiries() {
      const tableWrap = document.getElementById('table-wrap');
      const cardsWrap = document.getElementById('cards-wrap');

      try {
        const res = await fetch('/api/inquiries');
        const rows = await res.json();

        if (!rows.length) {
          const empty = '<p class="empty">No inquiries yet. Share the website to start receiving requests!</p>';
          tableWrap.innerHTML = empty;
          cardsWrap.innerHTML = empty;
          return;
        }

        tableWrap.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Class</th>
                <th>Subject</th>
                <th>Phone</th>
                <th>Submitted</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(r => `
                <tr>
                  <td>${r.id}</td>
                  <td><span class="badge badge-class">${r.class_name || '—'}</span></td>
                  <td><span class="badge">${r.subject}</span></td>
                  <td><a href="tel:${r.phone}">${r.phone}</a></td>
                  <td>${formatDate(r.created_at)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>`;

        cardsWrap.innerHTML = rows.map(r => `
          <article class="card">
            <div class="card-badges">
              <span class="badge badge-class">${r.class_name || '—'}</span>
              <span class="badge">${r.subject}</span>
            </div>
            <div class="card-row"><span>Phone</span><a href="tel:${r.phone}">${r.phone}</a></div>
            <div class="card-row"><span>Submitted</span><span>${formatDate(r.created_at)}</span></div>
          </article>
        `).join('');
      } catch {
        const msg = '<p class="empty">Could not load inquiries. Is the server running?</p>';
        tableWrap.innerHTML = msg;
        cardsWrap.innerHTML = msg;
      }
    }
    loadInquiries();
  </script>
</body>
</html>
